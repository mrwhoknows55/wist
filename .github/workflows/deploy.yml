name: build-and-deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all targets
        run: ./gradlew :server:buildFatJar :composeApp:jsBrowserDistribution :composeApp:wasmJsBrowserDistribution

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          REPO="${{ github.repository }}"
          REGISTRY="ghcr.io"
          IMAGE="${REGISTRY}/${REPO,,}"
          VERSION=$(git rev-parse --short HEAD)
          echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package JS distribution
        run: zip -r js-distribution.zip composeApp/build/dist/js/productionExecutable/

      - name: Package Wasm JS distribution
        run: zip -r wasmjs-distribution.zip composeApp/build/dist/wasmJs/productionExecutable/

      - name: Upload JS distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: js-distribution
          path: js-distribution.zip

      - name: Upload Wasm JS distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasmjs-distribution
          path: wasmjs-distribution.zip
